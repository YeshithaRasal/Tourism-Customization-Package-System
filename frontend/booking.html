<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Summary | LankaTravels</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="background: #f8fafc;">
<nav style="background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0;">
        <a href="index.html" class="logo">LankaTravels</a>
        <ul class="nav-links" id="auth-link" style="list-style: none;">
            <!-- Dynamic Role-Based Links -->
        </ul>
    </div>
</nav>

<main class="container" style="margin-top: 3rem; max-width: 800px;">
    <div class="card animate-fade-in" style="padding: 2.5rem; background: white; border: 1px solid #e2e8f0;">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 64px; height: 64px; background: #dcfce7; color: #166534; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 2rem;">✓</div>
            <h2 style="font-size: 1.875rem; font-weight: 700;">Booking Summary</h2>
            <p style="color: var(--muted);" id="booking-ref">Reference: #...</p>
        </div>

        <div id="booking-details" style="margin-bottom: 2rem;">
            <!-- Populate dynamically -->
        </div>

        <div style="background: #f8fafc; padding: 1.5rem; border-radius: var(--radius); margin-bottom: 2rem; border: 1px solid #e2e8f0;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 600;">Grand Total</span>
                <span id="total-cost" style="font-weight: 800; font-size: 1.5rem; color: var(--primary);">LKR 0</span>
            </div>
        </div>

        <div style="display: flex; gap: 1rem;">
            <a href="payment.html" id="pay-link" class="btn btn-primary" style="flex: 1; padding: 1rem; text-align: center;">Proceed to Payment</a>
            <button onclick="window.print()" class="btn btn-outline" style="padding: 1rem;">Print Summary</button>
        </div>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    async function loadBooking() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (!id) return;

        const userStr = localStorage.getItem('user');
        if (!userStr) return;
        const user = JSON.parse(userStr);

        document.getElementById('booking-ref').innerText = `Reference: #TRV-${id.padStart(5, '0')}`;
        document.getElementById('pay-link').href = `payment.html?id=${id}`;

        try {
            // Fetch specific booking details
            const res = await apiFetch(`/bookings/id/${id}`);
            const booking = await res.json();

            if (booking) {
                if (isAdmin()) {
                    document.getElementById('pay-link').style.display = 'none';
                }

                if (booking.status === 'confirmed') {
                    document.getElementById('pay-link').innerText = 'Paid & Confirmed';
                    document.getElementById('pay-link').classList.add('disabled');
                    document.getElementById('pay-link').style.pointerEvents = 'none';
                    document.getElementById('pay-link').style.opacity = '0.6';
                }

                document.getElementById('total-cost').innerText = `LKR ${booking.totalCost.toLocaleString()}`;
                document.getElementById('booking-details').innerHTML = booking.details.map(d => `
                    <div style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0;">
                        <h3 style="font-size: 1.125rem; margin-bottom: 0.5rem; font-family: var(--font-body); font-weight: 800;">${d.destination ? d.destination.name : 'Unknown Location'}</h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; font-size: 0.875rem; color: #64748b;">
                            <div>
                                <p>Hotel: <strong>${d.hotel ? d.hotel.name : 'Not selected'}</strong></p>
                                <p>Stay: <strong>${d.numNights} nights</strong></p>
                            </div>
                            <div style="text-align: right;">
                                <p>Subtotal: <strong>LKR ${d.subtotal.toLocaleString()}</strong></p>
                            </div>
                        </div>
                        <div style="margin-top: 0.5rem; font-size: 0.8125rem; color: var(--primary); font-weight: 600;">
                            Activities: ${d.activities ? d.activities.map(a => a.name).join(', ') : 'None selected'}
                        </div>
                    </div>
                `).join('');
            }
        } catch (e) {
            console.error(e);
        }
    }
    loadBooking();
</script>
</body>
</html>
