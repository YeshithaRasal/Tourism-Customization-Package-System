<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | LankaTravels</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="background: #f8fafc;">
<nav style="background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0;">
        <a href="index.html" class="logo">LankaTravels</a>
        <ul class="nav-links" id="auth-link" style="list-style: none;">
            <!-- Dynamic Role-Based Links -->
        </ul>
    </div>
</nav>

<main class="container" style="max-width: 900px; margin: 4rem auto;">
    <div class="card animate-fade-in" style="padding: 4rem; border: 1px solid #e2e8f0; border-radius: 2rem; background: white;">
        <div style="display: flex; align-items: center; gap: 3rem; margin-bottom: 3rem;">
            <div id="user-avatar-container" style="position: relative;">
                <div id="user-initials" style="width: 120px; height: 120px; background: var(--primary-light); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 800; border: 4px solid white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden;">
                    <img id="user-pic" src="" alt="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                    <span id="initials-text">?</span>
                </div>
            </div>
            <div>
                <h1 id="user-name" style="font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; font-family: var(--font-body);">User Name</h1>
                <p id="user-email" style="color: var(--muted); font-size: 1.125rem;">user@example.com</p>
                <span id="user-role-badge" class="badge" style="margin-top: 1rem; background: #e0e7ff; color: #4338ca;">USER</span>
            </div>
        </div>

        <div style="display: flex; gap: 1rem; border-top: 1px solid #f1f5f9; pt: 2rem; padding-top: 2rem;">
            <button class="btn btn-primary" onclick="openProfileModal()">Update Profile Details</button>
            <button class="btn btn-outline" style="color: #dc2626; border-color: #fecaca; background: #fff5f5;" onclick="deleteMyAccount()">Delete My Account</button>
        </div>
    </div>

    <div id="admin-users-section" class="admin-only" style="margin-top: 4rem; background: white; padding: 3rem; border-radius: 2rem; border: 1px solid #e2e8f0;">
        <h2 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 2rem;">Administrator: System Users</h2>
        <div id="users-grid" style="display: grid; gap: 1rem;">
            <!-- Populate dynamically -->
        </div>
    </div>
</main>

<!-- Edit Profile Modal -->
<div id="profile-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin-bottom: 1.5rem;">Edit Profile</h2>
        <form id="profile-form">
            <input type="hidden" id="edit-user-id">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="edit-name" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" id="edit-email" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">Profile Picture</label>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <input type="file" id="edit-pic-file" class="form-input" accept="image/*" style="flex: 1;">
                    <button type="button" class="btn btn-outline" style="color: #dc2626; border-color: #fecaca; padding: 0.5rem;" onclick="removeProfilePic()">Remove</button>
                </div>
                <input type="hidden" id="edit-pic-base64">
                <p style="font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem;">Select an image from your gallery.</p>
            </div>
            <div class="form-group">
                <label class="form-label">New Password (leave blank to keep current)</label>
                <input type="password" id="edit-password" class="form-input" placeholder="••••••••">
            </div>
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    let currentUser = null;

    async function init() {
        const userData = localStorage.getItem('user');
        if (!userData) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = JSON.parse(userData);
        renderProfile();

        if (isAdmin()) {
            loadAllUsers();
        }
    }

    function renderProfile() {
        document.getElementById('user-name').innerText = currentUser.name;
        document.getElementById('user-email').innerText = currentUser.email;

        const pic = document.getElementById('user-pic');
        const initials = document.getElementById('initials-text');
        if (currentUser.profilePicture) {
            pic.src = currentUser.profilePicture;
            pic.style.display = 'block';
            initials.style.display = 'none';
        } else {
            pic.style.display = 'none';
            initials.style.display = 'inline';
            initials.innerText = currentUser.name.charAt(0).toUpperCase();
        }

        document.getElementById('user-role-badge').innerText = currentUser.role === 'ROLE_ADMIN' ? 'ADMINISTRATOR' : 'TRAVELER';
        document.getElementById('user-role-badge').style.background = currentUser.role === 'ROLE_ADMIN' ? '#fee2e2' : '#e0e7ff';
        document.getElementById('user-role-badge').style.color = currentUser.role === 'ROLE_ADMIN' ? '#991b1b' : '#4338ca';
    }

    async function loadAllUsers() {
        try {
            const res = await apiFetch('/users');
            if (res.ok) {
                const users = await res.json();
                const grid = document.getElementById('users-grid');
                grid.innerHTML = users.map(u => `
                    <div class="card" style="padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f1f5f9; box-shadow: none;">
                        <div>
                            <div style="font-weight: 700; color: #1e293b;">${u.name} ${u.id === currentUser.id ? '(You)' : ''}</div>
                            <div style="font-size: 0.8125rem; color: var(--muted);">${u.email} • ${u.role}</div>
                        </div>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;" onclick="location.href='package-builder.html?filterUser=${u.id}'">View Bookings</button>
                            <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;" onclick="openProfileModal(${JSON.stringify(u).replace(/"/g, '&quot;')})">Edit</button>
                            ${u.id !== currentUser.id ? `<button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; color: #dc2626;" onclick="deleteUser(${u.id})">Delete</button>` : ''}
                        </div>
                    </div>
                `).join('');
            }
        } catch (err) {
            console.error(err);
        }
    }

    function openProfileModal(user = null) {
        const target = user || currentUser;
        document.getElementById('edit-user-id').value = target.id;
        document.getElementById('edit-name').value = target.name;
        document.getElementById('edit-email').value = target.email;
        document.getElementById('edit-pic-base64').value = target.profilePicture || '';
        document.getElementById('edit-pic-file').value = '';
        document.getElementById('edit-password').value = '';
        document.getElementById('profile-modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('profile-modal').classList.remove('active');
    }

    async function deleteUser(id) {
        if (!confirm('Are you sure you want to delete this user?')) return;
        try {
            const res = await apiFetch(`/users/${id}`, { method: 'DELETE' });
            if (res.ok) {
                loadAllUsers();
            }
        } catch (err) {
            alert('Failed to delete user');
        }
    }

    document.getElementById('profile-form').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-user-id').value;
        const payload = {
            name: document.getElementById('edit-name').value,
            email: document.getElementById('edit-email').value,
            profilePicture: document.getElementById('edit-pic-base64').value
        };
        const pwd = document.getElementById('edit-password').value;
        if (pwd) payload.password = pwd;

        try {
            const res = await apiFetch(`/users/${id}`, {
                method: 'PUT',
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                const updatedUser = await res.json();
                if (id == currentUser.id) {
                    // Preserve the existing token when updating user data
                    const token = localStorage.getItem('token');
                    const userToStore = { ...updatedUser, token: token };
                    localStorage.setItem('user', JSON.stringify(userToStore));
                    currentUser = userToStore;
                    renderProfile();
                    // Trigger navbar refresh if auth-link exists
                    if (typeof updateAuthLink === 'function') updateAuthLink();
                }
                closeModal();
                if (isAdmin()) loadAllUsers();
                alert('Profile updated successfully!');
            } else {
                const errorText = await res.text();
                alert('Failed to update profile: ' + errorText);
            }
        } catch (err) {
            console.error(err);
            alert('Error updating profile: ' + err.message);
        }
    };

    async function deleteMyAccount() {
        if (!confirm('Are you sure you want to PERMANENTLY delete your account? This action cannot be undone.')) return;
        try {
            const res = await apiFetch(`/users/${currentUser.id}`, { method: 'DELETE' });
            if (res.ok) {
                alert('Your account has been deleted.');
                logout();
            } else {
                alert('Failed to delete account');
            }
        } catch (err) {
            alert('Error deleting account');
        }
    }

    // Handle file to Base64 conversion
    document.getElementById('edit-pic-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('edit-pic-base64').value = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function removeProfilePic() {
        document.getElementById('edit-pic-file').value = '';
        document.getElementById('edit-pic-base64').value = '';
        alert('Picture will be removed upon saving.');
    }

    init();
</script>
</body>
</html>
