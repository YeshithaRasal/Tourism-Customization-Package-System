<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | LankaTravels</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 100%);">
<div class="card animate-fade-in" style="width: 100%; max-width: 400px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);">
    <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="logo" style="margin-bottom: 1rem; display: block;">LankaTravels</a>
        <h2 style="font-size: 1.5rem; font-weight: 700;">Create account</h2>
        <p style="color: var(--muted); font-size: 0.875rem;">Join us to start planning your Sri Lankan adventure</p>
    </div>

    <form id="signup-form">
        <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" id="name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Register</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--muted);">
        Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Sign in</a>
    </p>
</div>

<script src="js/api.js"></script>
<script>
    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_BASE_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            if (response.ok) {
                alert('Registration successful! Please login.');
                window.location.href = 'login.html';
            } else {
                const msg = await response.text();
                alert(msg || 'Registration failed');
            }
        } catch (err) {
            alert('Connection error');
        }
    });
</script>
</body>
</html>
