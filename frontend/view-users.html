<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | LankaTravels</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #4f46e5;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--background);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 3rem;
        }

        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
        }

        .content-card {
            background: var(--card-bg);
            border-radius: 1.5rem;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 1rem 1.5rem;
            background: #f1f5f9;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .data-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-admin { background: #e0e7ff; color: #4338ca; }
        .badge-user { background: #f1f5f9; color: #475569; }

        .action-btn {
            padding: 0.5rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-muted);
        }

        .action-btn:hover {
            background: #f1f5f9;
            color: var(--text-main);
        }

        .btn-edit { color: var(--primary); }
        .btn-delete { color: var(--danger); }

        .hidden { display: none !important; }
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white; padding: 2rem; border-radius: 1rem;
            max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-family: inherit;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
<div id="user-modal" class="modal hidden">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
            <h2 id="modal-title">Edit User</h2>
            <button onclick="closeModal()" class="action-btn"><i class="fas fa-times"></i></button>
        </div>
        <form id="user-form">
            <input type="hidden" id="edit-user-id">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="user-name" class="form-control" required placeholder="Enter full name">
            </div>
            <div class="form-group">
                <label>Email (Username)</label>
                <input type="email" id="user-email" class="form-control" required placeholder="Enter email address">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="user-role" class="form-control">
                    <option value="ROLE_USER">Regular User</option>
                    <option value="ROLE_ADMIN">Administrator</option>
                </select>
            </div>
            <div class="form-group">
                <label>Profile Picture</label>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <input type="file" id="user-pic-file" class="form-control" accept="image/*" style="flex: 1;">
                    <button type="button" class="action-btn" style="color: var(--danger); border-color: #fecaca;" onclick="removeUserPic()">Remove</button>
                </div>
                <input type="hidden" id="user-pic-base64">
            </div>
            <div class="form-group">
                <label>New Password (leave blank to keep current)</label>
                <input type="password" id="user-password" class="form-control" placeholder="Enter new password">
            </div>
            <button type="submit" class="btn-submit">Save Changes</button>
        </form>
    </div>
</div>

<nav style="background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0;">
        <a href="index.html" class="logo">LankaTravels</a>
        <ul class="nav-links" id="auth-link" style="list-style: none; display: flex; gap: 2rem;">
            <!-- Dynamic Links -->
        </ul>
    </div>
</nav>

<div class="admin-container">
    <div class="header-section">
        <div>
            <h1>User Management</h1>
            <p style="color: var(--text-muted);">View, update, and manage all registered users.</p>
        </div>
        <div style="text-align: right;">
            <a href="management.html" class="btn btn-outline" style="font-size: 0.875rem; border: 1px solid #e2e8f0; background: white; color: var(--text-main); padding: 0.5rem 1rem; border-radius: 0.5rem; text-decoration: none;">
                <i class="fas fa-arrow-left"></i> Back to Hub
            </a>
        </div>
    </div>

    <div class="content-card">
        <div style="padding: 1.5rem; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="font-size: 1.25rem; font-weight: 700;">Registered Users</h2>
            <div id="user-count" style="font-size: 0.875rem; color: var(--text-muted);"></div>
        </div>
        <table class="data-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>User Info</th>
                <th>Role</th>
                <th>Joined Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="user-table-body">
            <!-- Data -->
            </tbody>
        </table>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    let users = [];

    async function init() {
        if (!isAdmin()) {
            window.location.href = 'home.html';
            return;
        }
        await loadUsers();
    }

    async function loadUsers() {
        try {
            const res = await apiFetch('/users');
            if (!res.ok) throw new Error('Failed to fetch');
            users = await res.json();
            renderUsers();
        } catch (err) {
            console.error('Failed to load users', err);
            alert('Could not load users. Please ensure you are logged in as an admin.');
        }
    }

    function renderUsers() {
        const tbody = document.getElementById('user-table-body');
        document.getElementById('user-count').innerText = `${users.length} users registered`;

        tbody.innerHTML = users.sort((a, b) => a.id - b.id).map(u => `
            <tr>
                <td>#${u.id}</td>
                <td>
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <div style="width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.875rem; font-weight: 700; color: var(--primary);">
                            ${u.profilePicture ? `<img src="${u.profilePicture}" style="width: 100%; height: 100%; object-fit: cover;">` : (u.name ? u.name.charAt(0).toUpperCase() : '?')}
                        </div>
                        <div>
                            <div style="font-weight: 600;">${u.name || 'N/A'}</div>
                            <div style="font-size: 0.875rem; color: var(--text-muted);">${u.email}</div>
                        </div>
                    </div>
                </td>
                <td>
                    <span class="badge ${u.role === 'ROLE_ADMIN' ? 'badge-admin' : 'badge-user'}">
                        ${u.role === 'ROLE_ADMIN' ? 'ADMIN' : 'USER'}
                    </span>
                </td>
                <td style="font-size: 0.875rem; color: var(--text-muted);">
                    ${u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'N/A'}
                </td>
                <td>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="action-btn btn-edit" onclick="editUser(${u.id})" title="Edit User">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="action-btn btn-delete" onclick="deleteUser(${u.id})" title="Delete User">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    function editUser(id) {
        const u = users.find(x => x.id === id);
        if (!u) return;

        document.getElementById('edit-user-id').value = u.id;
        document.getElementById('user-name').value = u.name || '';
        document.getElementById('user-email').value = u.email;
        document.getElementById('user-role').value = u.role;
        document.getElementById('user-pic-base64').value = u.profilePicture || '';
        document.getElementById('user-pic-file').value = '';
        document.getElementById('user-password').value = '';

        document.getElementById('modal-title').innerText = `Edit User: ${u.email}`;
        document.getElementById('user-modal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('user-modal').classList.add('hidden');
    }

    document.getElementById('user-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-user-id').value;
        const data = {
            name: document.getElementById('user-name').value,
            email: document.getElementById('user-email').value,
            role: document.getElementById('user-role').value,
            profilePicture: document.getElementById('user-pic-base64').value
        };

        const password = document.getElementById('user-password').value;
        if (password) {
            data.password = password;
        }

        try {
            const res = await apiFetch(`/users/${id}`, {
                method: 'PUT',
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert('User updated successfully!');
                closeModal();
                loadUsers();
            } else {
                const err = await res.text();
                alert('Update failed: ' + err);
            }
        } catch (err) {
            alert('An error occurred during update');
        }
    });

    async function deleteUser(id) {
        const u = users.find(x => x.id === id);
        if (!u) return;

        if (!confirm(`Are you sure you want to delete user ${u.email}? This action cannot be undone.`)) return;

        try {
            const res = await apiFetch(`/users/${id}`, { method: 'DELETE' });
            if (res.ok) {
                alert('User deleted successfully!');
                loadUsers();
            } else {
                alert('Delete failed');
            }
        } catch (err) {
            alert('An error occurred during delete');
        }
    }

    // Handle file to Base64 conversion
    document.getElementById('user-pic-file').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('user-pic-base64').value = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function removeUserPic() {
        document.getElementById('user-pic-file').value = '';
        document.getElementById('user-pic-base64').value = '';
        alert('Picture will be removed upon saving.');
    }

    init();
</script>
</body>
</html>
