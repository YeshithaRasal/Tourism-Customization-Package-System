<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Feedback | LankaTravels</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .star-rating { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; }
        .star { font-size: 2.5rem; cursor: pointer; color: #e2e8f0; transition: color 0.2s; }
        .star.active { color: #f59e0b; }
    </style>
</head>
<body style="background: #fdfdfd;">
<nav style="background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100;">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center; padding: 1rem 0;">
        <a href="index.html" class="logo">LankaTravels</a>
        <ul class="nav-links" id="auth-link" style="list-style: none;">
            <!-- Dynamic Role-Based Links -->
        </ul>
    </div>
</nav>

<main class="container" style="margin-top: 5rem; max-width: 600px;">
    <div class="card animate-fade-in" style="padding: 3rem; text-align: center; border: 1px solid #f1f5f9; border-radius: 2rem;">
        <div style="font-size: 3rem; margin-bottom: 1.5rem;">⭐</div>
        <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 1rem; font-family: var(--font-body);">Rate Your Experience</h1>
        <p style="color: var(--muted); margin-bottom: 2.5rem;">How was your booking process and the travel package we built for you?</p>

        <form id="review-form">
            <div class="star-rating" id="star-container">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
            <input type="hidden" id="rating-value" value="5">

            <div class="form-group">
                <textarea id="review-comment" class="form-input" style="height: 120px; border-radius: 1rem;" placeholder="Tell us more about your experience..." required></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1.25rem; border-radius: 1rem; font-weight: 800; font-size: 1.125rem;">Submit Review</button>
        </form>

        <a href="index.html" style="display: inline-block; margin-top: 2rem; color: var(--muted); font-size: 0.875rem; text-decoration: underline;">Skip for now</a>
    </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const bookingId = urlParams.get('bookingId');
    let selectedRating = 5;

    // Star rating logic
    const stars = document.querySelectorAll('.star');
    stars.forEach(star => {
        star.onclick = () => {
            selectedRating = parseInt(star.getAttribute('data-value'));
            updateStars();
        };
    });

    function updateStars() {
        stars.forEach(star => {
            const val = parseInt(star.getAttribute('data-value'));
            star.classList.toggle('active', val <= selectedRating);
        });
        document.getElementById('rating-value').value = selectedRating;
    }
    updateStars();

    document.getElementById('review-form').onsubmit = async (e) => {
        e.preventDefault();
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) return;

        const payload = {
            rating: selectedRating,
            comment: document.getElementById('review-comment').value,
            user: { id: user.id },
            bookingId: bookingId ? parseInt(bookingId) : null
        };

        try {
            const res = await apiFetch('/reviews', {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert('Thank you for your feedback!');
                window.location.href = 'index.html';
            } else {
                alert('Failed to submit review');
            }
        } catch (err) {
            alert('Error connecting to server');
        }
    };
</script>
</body>
</html>
