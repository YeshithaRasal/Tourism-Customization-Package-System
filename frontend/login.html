<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LankaTravels</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #eff6ff 0%, #f5f3ff 100%);">
<div class="card animate-fade-in" style="width: 100%; max-width: 400px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);">
    <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="logo" style="margin-bottom: 1rem; display: block;">LankaTravels</a>
        <h2 id="login-title" style="font-size: 1.5rem; font-weight: 700;">Welcome back</h2>
        <p id="login-desc" style="color: var(--muted); font-size: 0.875rem;">Enter your credentials to access your account</p>
    </div>

    <form id="login-form">
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
        </div>
        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Sign In</button>
    </form>

    <p id="signup-link-container" style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--muted);">
        Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 600; text-decoration: none;">Create one</a>
    </p>
</div>

<script src="js/api.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const role = urlParams.get('role') || 'user';

    if (role === 'admin') {
        document.getElementById('login-title').innerText = 'Administrator Login';
        document.getElementById('login-desc').innerText = 'Restricted access for group members only';
        document.getElementById('signup-link-container').style.display = 'none';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(`${API_BASE_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                console.log('Login success:', data);

                // Role verification
                console.log('Verifying role. Required:', role, 'Received:', data.role);
                if (role === 'admin' && data.role !== 'ROLE_ADMIN') {
                    console.error('Role mismatch: Expected ROLE_ADMIN but got', data.role);
                    alert('Unauthorized: This account does not have administrator privileges.');
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data));
                window.location.href = 'home.html';
            } else {
                const errorMsg = await response.text();
                alert('Login Failed: ' + errorMsg);
            }
        } catch (err) {
            console.error('Fetch error:', err);
            alert('Connection Error: Is the backend server running?');
        }
    });
</script>
</body>
</html>
